/* code snippets for the container were taken from the Interactive Media Week 1 and 2 modules, cheatsheets, and The Interactive Media Gallery Builder (https://karenanndonnachie.github.io/VCA_INTERACTIVEMEDIA/CHEATSHEETS/gallery_builder.html)

#container {
height: 90vh;
width: 90vw;
margin: 0 auto;
display: flex;
flex-direction: column;
border: 7px dashed rgb(103, 60, 2); ;
border-bottom: none;
background-image: url("images/paddock3.jpg");
}

.child {
flex: 1;
  width: 100%;
  border-bottom: 7px dashed rgb(103, 60, 2);
  text-align: center;
  color: chartreuse;
}

.container {
    width: 100%;
    height: auto; 
    position: center;
    overflow: visible;
}

.flying-png {
    position: absolute;
    width: 50px; 
    height: auto;
    animation: fly 25s linear infinite; 
}
/* code for flying PNG was created through using code snippets (later altered) from the following sites: 
https://cargo2support.cargo.site/Make-an-Image-Fly-Across-the-Screen
https://wicky.co/make-an-image-fly-across-the-screen/#:~:text=Part%201%20CSS%20Code:,ShowHideDiv(this)%22%20/%3E
*/

@keyframes fly {
    0% {
        top: 0;
        left: 0;
        transform: translate(0, 0) rotate(0deg);
    }
 20% {
        top: 20%;
        left: 97%;
        transform: translate(0, -50%) rotate(90deg);
    }
    40% {
        top: 40%;
        left: 0%;
        transform: translate(0, -100%) rotate(180deg);
    }
    65% {
        top: 100%;
        left: 97%;
        transform: translate(0, -50%) rotate(270deg);
    }
    80% {
        top: 150%;
        left: 0%;
        transform: translate(0, 0) rotate(360deg);
    }
    100% {
        top: 190%;
        left: 110%;
        transform: translate(0, 0) rotate(360deg);
    }
    
}

footer{
